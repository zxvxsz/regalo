<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña hermosa</title>
    <style>
        body {
            background-color: #ffeef2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(214, 51, 132, 0.15);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 3px dashed #ffb3c6;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .photo-container {
            width: 100%;
            max-width: 250px;
            height: 250px;
            margin: 0 auto 20px;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #ff4d6d;
            position: relative;
            cursor: pointer;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1, h2 { color: #d63384; margin-bottom: 15px; }
        h1 { font-size: 1.6rem; }
        h2 { font-size: 1.3rem; }

        p { color: #555; font-size: 1rem; line-height: 1.5; min-height: 50px; }

        .buttons { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }

        button {
            flex: 1;
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        button:disabled { background-color: #ffccd5; }

        .grid-reasons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .btn-emoji { font-size: 1.3rem; padding: 10px; background: #fff0f3; border: 1px solid #ffb3c6; }

        #btnMusicaContainer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 30px;
            border: 1px solid #ffb3c6;
        }
    </style>
</head>
<body>

    <!-- TARJETA 1: FOTOS -->
    <div class="card">
        <div class="photo-container" onclick="revelarSecreto()">
            <img id="foto" src="dcb364cda26003eb77348739a2c560d6.jpg" alt="Foto">
        </div>
        <p id="pista" style="font-size: 0.8rem; color: #ff8fa3;">✨ Toca la foto ✨</p>
        <h1 id="titulo">Para mi niña hermosa</h1>
        <p id="mensaje">Quería darte un detalle diferente, algo que pudieras guardar siempre.</p>
        
        <div class="buttons">
            <button id="btnAnt" onclick="cambiarCarta(-1)" disabled>Anterior</button>
            <button id="btnSig" onclick="cambiarCarta(1)">Siguiente</button>
        </div>
    </div>

    <!-- TARJETA 2: RAZONES -->
    <div class="card">
        <h2>3 cosas que amo de ti...</h2>
        <div class="grid-reasons">
            <button class="btn-emoji" onclick="mostrarRazon('Tu sonrisa', 'Es lo que más me alegra el día.')">😸</button>
            <button class="btn-emoji" onclick="mostrarRazon('Tu apoyo', 'Gracias por estar ahí siempre.')">🤝</button>
            <button class="btn-emoji" onclick="mostrarRazon('Tu forma de ser', 'Eres única en este mundo.')">✨</button>
            <button class="btn-emoji" onclick="mostrarRazon('Tu risa', 'Es contagiosa y me hace feliz.')">😂</button>
            <button class="btn-emoji" onclick="mostrarRazon('Tu inteligencia', 'Admiro cómo solucionas todo.')">🧠</button>
            <button class="btn-emoji" onclick="mostrarRazon('Tu amor', 'Es lo que más anhelo.')">💕</button>
        </div>
        <p id="textoRazon" style="font-weight: bold; color: #ff4d6d; margin-top: 15px;"></p>
    </div>

    <!-- TARJETA 3: PLANES -->
    <div class="card" style="border-style: dotted;">
        <h2>Nuestros planes ✨</h2>
        <p id="textoFuturo">Haz clic en el dado...</p>
        <button onclick="generarPlan()" style="font-size: 1.5rem; background: #ffb3c6;">🎲</button>
    </div>

    <!-- MÚSICA -->
    <div id="btnMusicaContainer">
        <span style="color: #d63384; font-size: 0.8rem; font-weight: bold;">Música -></span>
        <button id="btnMusica" onclick="toggleMusica()" style="width: 40px; height: 40px; border-radius: 50%; flex: none;">▶</button>
    </div>

    <audio id="miMusica" loop>
        <source src="(Just Like) Starting Over (Ultimate Mix) - John Lennon.mp3" type="audio/mpeg">
    </audio>

    <script>
        const cartas = [
            {
                titulo: "Para mi niña hermosa",
                mensaje: "Quería darte un detalle diferente, algo que pudieras guardar siempre por que no nos podemos ver creo esta manera es la mejor.",
                foto: "dcb364cda26003eb77348739a2c560d6.jpg",
                secreto: "¿Curiosa que no? Sabía que tendrías curiosidad... Te amo más de lo que imaginas y he tenido sueños contigo..."
            },
            {
                titulo: "Yo te aprecio mucho!",
                mensaje: "Me encanta estar contigo y disfrutar de cada momento juntos yo te quiero.",
                foto: "481448fedd5470cf93d9f1590676d863.jpg",
                secreto: null
            },
            {
                titulo: "¿Siempre juntos?",
                mensaje: "Eres mi persona favorita en todo el mundo. Gracias por estar conmigo.",
                foto: "d66030f8e3c3418213a0d3da70685ac9.jpg",
                secreto: null
            },
            {
                titulo: "Flores para ti",
                mensaje: "¡Te amo muchísimo! Eres la persona más especial para mí.",
                foto: "ff6fb8ae413ef6a221c53d77ad4207db.jpg",
                secreto: null
            }
        ];

        let indiceActual = 0;

        function cambiarCarta(direccion) {
            indiceActual += direccion;
            document.getElementById('titulo').innerText = cartas[indiceActual].titulo;
            document.getElementById('mensaje').innerText = cartas[indiceActual].mensaje;
            document.getElementById('foto').src = cartas[indiceActual].foto;
            document.getElementById('pista').style.visibility = (cartas[indiceActual].secreto) ? 'visible' : 'hidden';
            document.getElementById('btnAnt').disabled = (indiceActual === 0);
            document.getElementById('btnSig').disabled = (indiceActual === cartas.length - 1);
        }

        function revelarSecreto() {
            if (cartas[indiceActual].secreto) {
                document.getElementById('mensaje').innerHTML = `<b>${cartas[indiceActual].secreto}</b>`;
            }
        }

        function mostrarRazon(titulo, detalle) {
            document.getElementById('textoRazon').innerHTML = `<span style="color:#d63384">${titulo}:</span> ${detalle}`;
        }

        function generarPlan() {
            const planes = ["Besarnos y darte cariño :3", "Ver una película juntos", "Darnos un abrazo fuerte", "Cocinar algo juntos", "Estar abrazados con música", "Ir a un lugar que nos guste"];
            document.getElementById('textoFuturo').innerText = planes[Math.floor(Math.random() * planes.length)];
        }

        var musica = document.getElementById("miMusica");
        var btn = document.getElementById("btnMusica");
        musica.volume = 0.5;

        function toggleMusica() {
            if (musica.paused) {
                musica.play();
                btn.innerHTML = "||";
                btn.style.background = "#d63384";
            } else {
                musica.pause();
                btn.innerHTML = "▶";
                btn.style.background = "#ff4d6d";
            }
        }
    </script>
</body>
</html>
